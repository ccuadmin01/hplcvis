<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HPLC Run Monitor</title>

  <!-- PWA Manifest & Service Worker -->
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('ServiceWorker registered with scope:', reg.scope);
        }).catch(err => {
          console.error('ServiceWorker registration failed:', err);
        });
      });
    }
  </script>

  <!-- QR Code Scanning Library -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <!-- Socket.io for Real-Time Sync -->
  <script src="/socket.io/socket.io.js"></script>

  <style>
    /* ============================================================
           ENTERPRISE LABORATORY DASHBOARD
           Inspired by Fluent Design, Material Design & Chromeleon
           Typography: Segoe UI / Inter / Roboto
        ============================================================ */

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    :root {
      /* Typography */
      --font-family: 'Inter', system-ui, -apple-system, sans-serif;
      --font-size-base: 14px;
      --font-size-sm: 12px;
      --font-size-xs: 11px;

      /* Teal & Yellow Flat Theme (From Image) */
      --bg-color: #f0f4f5;
      --surface-color: #ffffff;
      --surface-hover: #f9fafa;
      --surface-alt: #f0f4f5;

      --primary-color: #0c9ba8;
      --primary-hover: #0a828d;
      --primary-light: rgba(12, 155, 168, 0.1);

      --text-primary: #333333;
      --text-secondary: #777777;
      --text-muted: #aaaaaa;

      --border-color: #e0e6e8;
      --border-strong: #ced4d6;

      --success-color: #ffc107; /* Map success/main actions to Yellow */
      --success-bg: rgba(255, 193, 7, 0.1);
      --warning-color: #ffb300;
      --warning-bg: rgba(255, 179, 0, 0.1);
      --danger-color: #f44336;
      --danger-bg: rgba(244, 67, 54, 0.1);

      --input-bg: #ffffff;
      --btn-bg: #ffc107;
      --btn-text: #ffffff;
      --btn-border: transparent;

      --shadow-sm: none;
      --shadow-md: none;
      --shadow-lg: none;

      --radius-sm: 4px;
      --radius-md: 4px;
      --radius-lg: 4px;
      --radius-full: 9999px;

      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Dark Theme */
    [data-theme="dark"] {
      --bg-color: #121212;
      --surface-color: #1e1e1e;
      --surface-hover: #2a2a2a;
      --surface-alt: #181818;

      --primary-color: #26c6da;
      --primary-hover: #00acc1;
      --primary-light: rgba(38, 198, 218, 0.1);

      --text-primary: #ffffff;
      --text-secondary: #aaaaaa;
      --text-muted: #777777;

      --border-color: #333333;
      --border-strong: #444444;

      --success-color: #ffc107;
      --success-bg: rgba(255, 193, 7, 0.15);
      --warning-color: #ffb300;
      --warning-bg: rgba(255, 179, 0, 0.15);
      --danger-color: #ef5350;
      --danger-bg: rgba(239, 83, 80, 0.15);

      --input-bg: #121212;
      --btn-bg: #ffc107;
      --btn-text: #121212;
      --btn-border: transparent;
    }

    /* Basic Resets */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* Dark Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: var(--radius-full);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--border-strong);
    }

    body {
      font-family: var(--font-family);
      font-size: var(--font-size-base);
      background-color: var(--bg-color);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      transition: background-color var(--transition);
      background-image: none;
    }

    /* ----------------------------------------------------
           Global Header
        ---------------------------------------------------- */
    .global-header {
      background-color: var(--primary-color);
      color: #ffffff;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    [data-theme="light"] .global-header {
      background-color: var(--primary-color);
      color: #ffffff;
    }

    .header-left h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      gap: 8px;
    }

    .btn-header {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: inherit;
      padding: 6px 12px;
      border-radius: var(--radius-full);
      cursor: pointer;
      transition: var(--transition);
      font-size: 12px;
      font-weight: 600;
    }

    [data-theme="light"] .btn-header {
      background: var(--surface-color);
      border: 1px solid var(--border-color);
    }

    .btn-header:hover {
      background: var(--surface-hover);
    }

    [data-theme="light"] .btn-header:hover {
      background: var(--surface-hover);
    }

    /* ----------------------------------------------------
           Unified Layout
        ---------------------------------------------------- */
    .dashboard {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }

    .col {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .col-header {
      display: none;
      /* Hide old column headers for unified look */
    }

    .col-body {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ----------------------------------------------------
           Inputs & Cards
        ---------------------------------------------------- */
    .card {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-lg);
      padding: 20px;
      background: var(--surface-color);
      transition: var(--transition);
    }

    .card:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-lg);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-color);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 12px;
    }

    .input-group:last-child {
      margin-bottom: 0;
    }

    .input-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .input-row>.input-group {
      flex: 1;
      margin-bottom: 0;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    input,
    select,
    textarea {
      padding: 8px 12px;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-family: var(--font-family);
      font-size: 13px;
      background: var(--input-bg);
      color: var(--text-primary);
      transition: var(--transition);
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px var(--primary-light);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
      border-radius: var(--radius-md);
    }

    /* ----------------------------------------------------
           Buttons
        ---------------------------------------------------- */
    .btn {
      padding: 8px 16px;
      border-radius: var(--radius-full);
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      border: none;
      background: var(--btn-bg);
      color: var(--btn-text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
      text-transform: uppercase;
    }

    .btn:hover {
      background: var(--surface-hover);
    }

    .btn:active {
      background: var(--surface-alt);
    }

    .btn-primary {
      background: var(--primary-color);
      border-color: var(--primary-hover);
      color: #ffffff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      /* same as btn */
    }

    #start-run-btn {
      font-size: 15px;
      font-weight: 700;
      padding: 12px;
      width: 100%;
      border-radius: var(--radius-md);
      margin-bottom: 16px;
      letter-spacing: 0.5px;
    }

    .btn-success {
      background: var(--success-color);
      color: #ffffff;
    }

    .btn-success:hover {
      background: #e6a800; /* Darker yellow */
    }

    .btn-warning {
      background: var(--warning-color);
      border-color: #d97706;
      color: #ffffff;
    }

    .btn-warning:hover {
      background: #d97706;
    }

    .btn-danger {
      background: var(--danger-color);
      border-color: #dc2626;
      color: #ffffff;
    }

    /* ----------------------------------------------------
           Column 1: Plate Grid (No Scroll, Full Visibility)
        ---------------------------------------------------- */
    #col-plate .col-body {
      padding: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .plate-container {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 0;
      /* allows flex shrinking */
    }

    .plate-grid {
      display: grid;
      grid-template-columns: 16px repeat(6, 28px);
      gap: 6px;
      justify-content: center;
      width: 100%;
      margin: 0 auto;
    }

    .header-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .vial {
      aspect-ratio: 1;
      border-radius: 50%;
      border: 2px solid var(--empty-border);
      background: var(--empty-bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 600;
      color: var(--text-secondary);
      position: relative;
      transition: var(--transition);
      cursor: default;
    }

    .vial.selected {
      border-color: var(--highlight-border);
      background: var(--highlight-bg);
      box-shadow: 0 0 0 2px var(--highlight-border);
    }

    .vial:hover {
      transform: scale(1.15);
      z-index: 10;
      box-shadow: var(--shadow-md);
    }

    .vial.fixed {
      border-color: var(--fixed-border);
      background: var(--fixed-bg);
    }

    .vial.std {
      border-color: var(--std-border);
      background: var(--std-bg);
    }

    .vial.spike {
      border-color: var(--spike-border);
      background: var(--spike-bg);
    }

    .vial.occupied {
      border-color: var(--occupied-border);
      background: var(--occupied-bg);
    }

    .vial.highlighted {
      border-color: var(--highlight-border);
      background: var(--highlight-bg);
    }

    .vial.vial-completed {
      opacity: 0.5;
      filter: grayscale(100%);
    }

    /* Legend */
    .legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
      padding-top: 6px;
      border-top: 1px solid var(--border-color);
      width: 100%;
      flex-shrink: 0;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 500;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: 1px solid;
    }

    /* ----------------------------------------------------
           Column 2: Statistics Card (Preparation Summary)
        ---------------------------------------------------- */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-box {
      background: var(--surface-alt);
      padding: 12px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: var(--transition);
    }

    .stat-box:hover {
      border-color: var(--primary-color);
      background: var(--surface-hover);
    }

    .stat-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-val {
      font-size: 16px;
      font-weight: 800;
      color: var(--text-primary);
    }

    /* ----------------------------------------------------
           Run Monitor & Queue
        ---------------------------------------------------- */
    .progress-box {
      background: var(--surface-alt);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 20px;
      margin-bottom: 16px;
    }

    .progress-track {
      height: 12px;
      background: rgba(0, 0, 0, 0.05);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin: 16px 0;
    }

    [data-theme="dark"] .progress-track {
      background: rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      height: 100%;
      background: var(--warning-color); /* Yellow flat progress */
      width: 0%;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: var(--radius-full);
    }

    .monitor-stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
    }

    /* Run Queue List */
    .run-queue {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
      min-height: 200px;
      max-height: 400px;
      overflow-y: auto;
      border-radius: var(--radius-md);
      padding: 4px;
    }

    .queue-item {
      background: var(--surface-alt);
      border: 1px solid var(--border-color);
      padding: 12px 16px;
      border-radius: var(--radius-md);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      cursor: pointer;
    }

    .queue-item:hover {
      transform: translateX(4px);
      border-color: var(--primary-color);
      background: var(--surface-hover);
    }

    .badge {
      padding: 4px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.pending {
      background: var(--surface-hover);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
    }

    .badge.running {
      background: var(--warning-bg);
      color: var(--warning-color);
      border: 1px solid var(--warning-color);
      animation: pulse 2s infinite;
    }

    .badge.completed {
      background: var(--success-bg);
      color: var(--success-color);
      border: 1px solid var(--success-color);
    }

    @keyframes pulse {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }

      100% {
        opacity: 1;
      }
    }

    /* ----------------------------------------------------
           Column 4: ChemStation Table
        ---------------------------------------------------- */
    .table-container {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: var(--surface-color);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      text-align: left;
    }

    th {
      position: sticky;
      top: 0;
      background: var(--surface-hover);
      font-weight: 600;
      color: var(--text-secondary);
      padding: 8px 12px;
      border-bottom: 2px solid var(--border-strong);
      z-index: 1;
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-color);
    }

    tr:nth-child(even) {
      background: var(--surface-hover);
    }

    tr:hover {
      background: var(--primary-light);
    }

    .export-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .export-actions .btn {
      flex: 1;
      padding: 6px;
      font-size: 11px;
    }

    /* Tooltips */
    .tooltip {
      position: absolute;
      background: rgba(15, 23, 42, 0.9);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      bottom: 120%;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
      z-index: 100;
    }

    .vial:hover .tooltip {
      opacity: 1;
    }

    /* Modals */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }

    .modal-content {
      background: var(--surface-color);
      padding: 24px;
      border-radius: var(--radius-lg);
      width: 90%;
      max-width: 500px;
      box-shadow: var(--shadow-lg);
    }
  </style>
</head>

<body>

  <!-- GLOBAL ENTERPRISE HEADER -->
  <div class="global-header">
    <div class="header-left">
      <h1 title="HPLC Run Monitor">HPLC Run Monitor</h1>
    </div>
    <div class="header-center">
    </div>
    <button class="btn-header" onclick="toggleDarkMode()" id="theme-btn">Theme</button>
  </div>
  </div>



  <!-- Finish Alert Modal -->
  <div id="finish-modal" class="modal-overlay">
    <div class="modal-content" style="text-align: center;">
      <h2 style="color: var(--success-color); margin-bottom: 12px;">Run Finished!</h2>
      <p>Timestamp: <span id="finish-time-display" style="font-weight: 600;"></span></p>
      <button class="btn btn-primary" onclick="closeModal('finish-modal')" style="margin-top: 24px;">Dismiss</button>
    </div>
  </div>

  <!-- QR Scanner Modal -->
  <div id="qr-modal" class="modal-overlay">
    <div class="modal-content">
      <h3 style="margin-bottom: 16px;">Scan QR Code</h3>
      <div id="reader"
        style="width: 100%; border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color);"></div>
      <div style="display:flex; justify-content:center; margin-top: 16px;">
        <button class="btn btn-secondary" onclick="stopScanner()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- 4-COLUMN DASHBOARD -->
  <div class="dashboard">

    <!-- COLUMN 2: METHOD & SETUP -->
    <div class="col">
      <div class="col-header">
        <h2>Setup</h2>
      </div>
      <div class="col-body">



        <div class="card">
          <div class="card-title">Run Parameters</div>
          <div class="input-row">
            <div class="input-group">
              <label>Inj. Vol (µL)</label>
              <input type="number" id="injvol-input" value="10.0" step="0.1" oninput="updateVisualization()">
            </div>
            <div class="input-group">
              <label>Run (m)</label>
              <input type="number" id="runtime-input" value="15.0" step="0.1" oninput="updateVisualization()">
            </div>

          </div>
          <div class="input-row" style="margin-bottom:0;">
            <div class="input-group">
              <label>Flow (mL/m)</label>
              <input type="number" id="flowrate-input" value="1.0" step="0.1" oninput="updateVisualization()">
            </div>
            <div class="input-group">
              <label>Fixed Vials (Name=Pos)</label>
              <input type="text" id="fixed-input" value="Methanol=P1:A11" oninput="updateVisualization()">
            </div>
          </div>
        </div>


        <div class="card">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
            <div class="card-title" style="margin:0;">Sequence List</div>
            <div style="display:flex; gap:4px;">
              <button class="btn-secondary"
                style="padding:4px 8px; font-size:11px; border-radius:4px; border:1px solid var(--danger-color); color:var(--danger-color); cursor:pointer;"
                onclick="document.getElementById('sequence-input').value = ''; updateVisualization();">Clear</button>
              <button class="btn-secondary"
                style="padding:4px 8px; font-size:11px; border-radius:4px; border:1px solid var(--border-strong); cursor:pointer;"
                onclick="startScanner()">Scan QR</button>
              <button class="btn-secondary"
                style="padding:4px 8px; font-size:11px; border-radius:4px; border:1px solid var(--border-strong); cursor:pointer;"
                onclick="document.getElementById('file-import').click()">Import</button>
            </div>
            <input type="file" id="file-import" style="display:none;" accept=".txt,.csv" onchange="handleImport(event)">
          </div>
          <textarea id="sequence-input" placeholder="Paste sample list here... (use *N for reps)"
            oninput="updateVisualization()" style="width:100%; height: 100px;"></textarea>
        </div>

      </div>
    </div>

    <!-- COLUMN 1: PLATE LAYOUT (Removed) -->
    <!-- COLUMN 4: CHEMSTATION EXPORT (Removed) -->

    <!-- COLUMN 3: RUN MONITOR -->
    <div class="col">
      <div class="col-header">
        <h2>Run Monitor</h2>
        <button class="btn-danger" style="font-size:11px; font-weight:600; cursor:pointer; border:none;"
          onclick="resetProgress()">RESET</button>
      </div>
      <div class="col-body" style="padding-bottom:0;">

        <button id="start-run-btn" class="btn btn-success" onclick="toggleRunState()">Start Run</button>

        <!-- Modern Stats Card -->
        <div class="card" style="background:var(--surface-alt); border-color:var(--border-color);">
          <div class="card-title" style="color:var(--primary-color);">Preparation Summary</div>
          <div class="stats-grid">
            <div class="stat-box">
              <span class="stat-label">Total Time</span>
              <span class="stat-val" id="prep-time">0h 0m</span>
            </div>
            <div class="stat-box">
              <span class="stat-label">Total Volume</span>
              <span class="stat-val" id="prep-vol">0.0 mL</span>
            </div>
          </div>
        </div>

        <div class="progress-box">
          <div class="monitor-stats">
            <span>Progress: <span id="est-injections" style="font-weight:700;">0 / 0</span></span>
            <span>End: <span id="est-end" style="font-weight:700;">--:--</span></span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-bar"></div>
          </div>
          <div style="display:flex; justify-content:flex-end; font-size:11px; color:var(--text-secondary);">
            <span id="live-clock">--:--:--</span>
          </div>
        </div>

        <!-- Run Queue -->
        <div class="card-title" style="margin-top:8px;">Run Queue</div>
        <div class="run-queue" id="seq-list">
          <!-- Queue items injected here via JS -->
        </div>
      </div>
    </div>

  </div> <!-- end dashboard -->

  <script>
    // Constants & Globals
    const ROWS = ['A', 'B', 'C', 'D', 'E', 'F'];
    const COLS = 11;
    const CACHE_KEY = 'hplcAestheticCache';

    let globalSequenceData = [];
    let completedIndices = new Set();
    let isRunning = false;
    let runFinishedAlerted = false;
    let html5QrcodeScanner;

    // Simulator State
    const DELAY_MINS = 10 / 60; // Constant 10 seconds delay
    let currentSampleStartTime = 0;

    // Socket.io initialization
    const socket = typeof io !== 'undefined' ? io() : null;

    if (socket) {
      socket.on('sync_state', (state) => {
        let needsUpdate = false;

        if (state.injvol !== undefined) { document.getElementById('injvol-input').value = state.injvol; needsUpdate = true; }
        if (state.runtime !== undefined) { document.getElementById('runtime-input').value = state.runtime; needsUpdate = true; }
        if (state.flowrate !== undefined) { document.getElementById('flowrate-input').value = state.flowrate; needsUpdate = true; }
        if (state.fixed !== undefined && document.getElementById('fixed-input').value !== state.fixed) {
          document.getElementById('fixed-input').value = state.fixed; needsUpdate = true;
        }
        if (state.sequence !== undefined && document.getElementById('sequence-input').value !== state.sequence) {
          document.getElementById('sequence-input').value = state.sequence; needsUpdate = true;
        }
        if (state.completed) {
          completedIndices = new Set(state.completed);
          needsUpdate = true;
        }
        if (state.running !== undefined && state.running !== isRunning) {
          isRunning = state.running;
          needsUpdate = true;
          const btn = document.getElementById('start-run-btn');
          if (isRunning) {
            btn.innerHTML = 'Pause Run';
            btn.classList.replace('btn-success', 'btn-warning');
          } else {
            btn.innerHTML = 'Start Run';
            btn.classList.replace('btn-warning', 'btn-success');
          }
        }
        if (state.currentSampleStartTime !== undefined) {
          currentSampleStartTime = state.currentSampleStartTime;
          needsUpdate = true;
        }

        if (needsUpdate) {
          updateVisualization(true);
        }
      });
    }

    // --- Modal & Theme Logic ---
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function toggleDarkMode() {
      const body = document.body;
      if (body.getAttribute('data-theme') !== 'dark') {
        body.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
      } else {
        body.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
      }
    }

    // --- State Management ---
    function saveToCache(skipEmit = false) {
      const cacheData = {
        injvol: document.getElementById('injvol-input').value,
        runtime: document.getElementById('runtime-input').value,
        flowrate: document.getElementById('flowrate-input').value,
        fixed: document.getElementById('fixed-input').value,
        sequence: document.getElementById('sequence-input').value,
        completed: Array.from(completedIndices),
        running: isRunning,
        currentSampleStartTime: currentSampleStartTime
      };
      localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));

      if (!skipEmit && socket) {
        socket.emit('update_state', cacheData);
      }
    }

    function loadFromCache() {
      if (localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
      else document.body.removeAttribute('data-theme');
      const cachedStr = localStorage.getItem(CACHE_KEY);
      if (cachedStr) {
        try {
          const c = JSON.parse(cachedStr);
          if (c.injvol !== undefined) document.getElementById('injvol-input').value = c.injvol;
          if (c.runtime !== undefined) document.getElementById('runtime-input').value = c.runtime;
          if (c.flowrate !== undefined) document.getElementById('flowrate-input').value = c.flowrate;
          if (c.fixed !== undefined) document.getElementById('fixed-input').value = c.fixed;
          if (c.sequence !== undefined) document.getElementById('sequence-input').value = c.sequence;
          if (c.completed) completedIndices = new Set(c.completed);
          if (c.currentSampleStartTime) currentSampleStartTime = c.currentSampleStartTime;
          if (c.running === true) { isRunning = false; toggleRunState(); }
        } catch (e) { console.error('Cache error', e); }
      }
    }


    // --- Run Control ---
    function toggleRunState() {
      isRunning = !isRunning;
      const btn = document.getElementById('start-run-btn');
      if (isRunning) {
        btn.innerHTML = 'Pause Run';
        btn.classList.replace('btn-success', 'btn-warning');
        runFinishedAlerted = false;
        // Start tracking time for the current sample
        currentSampleStartTime = Date.now();
      } else {
        btn.innerHTML = 'Start Run';
        btn.classList.replace('btn-warning', 'btn-success');
      }
      saveToCache();
    }

    function toggleCompletion(index) {
      if (completedIndices.has(index)) completedIndices.delete(index);
      else completedIndices.add(index);
      updateVisualization();
      saveToCache();
    }


    loadFromCache(); startLiveTimer(); updateVisualization();

    function resetProgress() {
      if (confirm("Reset all checkmarks?")) {
        completedIndices.clear();
        runFinishedAlerted = false;
        if (isRunning) toggleRunState();
        updateVisualization();
      }
    }

    // --- Core Logic ---
    function parseFixedVials() {
      const rawFixed = document.getElementById('fixed-input').value;
      const fixedMap = {};
      rawFixed.split(',').forEach(item => {
        const parts = item.split('=').map(s => s.trim());
        if (parts.length === 2 && parts[0] && parts[1]) {
          const name = parts[0].toLowerCase();
          let pos = parts[1].toUpperCase();
          let plate = 1;
          if (pos.includes(':')) {
            const posParts = pos.split(':');
            plate = parseInt(posParts[0].replace('P', '')) || 1;
            pos = posParts[1];
          }
          fixedMap[name] = { plate, pos, originalName: parts[0] };
        }
      });
      return fixedMap;
    }

    function updateVisualization(skipEmit = false) {
      const plateSelect = document.getElementById('plate-select');
      const selectedPlate = plateSelect ? parseInt(plateSelect.value) : 1;
      const rawText = document.getElementById('sequence-input').value;
      const searchEl = document.getElementById('search-input');
      const searchQuery = searchEl ? searchEl.value.trim().toLowerCase() : '';

      const seqListEl = document.getElementById('seq-list');
      const tbody = document.getElementById('chemstation-body');
      const currentScroll = seqListEl.scrollTop;

      const fixedMap = parseFixedVials();
      const reservedPositions = new Set();
      Object.values(fixedMap).forEach(f => reservedPositions.add(`P${f.plate}:${f.pos}`));

      let expandedSamples = [];
      rawText.split('\n').map(s => s.trim()).filter(s => s.length > 0).forEach(line => {
        const match = line.match(/^(.*?)\s*[\*xX]\s*(\d+)$/);
        if (match) {
          for (let i = 0; i < parseInt(match[2], 10); i++) expandedSamples.push(match[1].trim());
        } else expandedSamples.push(line);
      });

      // Cleanup orphan checkboxes
      const validIndices = new Set();
      completedIndices.forEach(idx => { if (idx < expandedSamples.length) validIndices.add(idx); });
      completedIndices = validIndices;

      const positionsPerPlate = ROWS.length * COLS;
      const vialMap = {}; const dynamicVialMap = {};

      if (seqListEl) seqListEl.innerHTML = '';
      if (tbody) tbody.innerHTML = '';
      globalSequenceData = [];
      let nextAutoIndex = 0;

      expandedSamples.forEach((sampleName, index) => {
        const lowerName = sampleName.toLowerCase();
        let samplePlate, samplePos, isFixed = false;

        if (fixedMap[lowerName]) {
          samplePlate = fixedMap[lowerName].plate; samplePos = fixedMap[lowerName].pos; isFixed = true;
        } else if (dynamicVialMap[lowerName]) {
          samplePlate = dynamicVialMap[lowerName].plate; samplePos = dynamicVialMap[lowerName].pos;
        } else {
          let foundSpot = false;
          while (!foundSpot) {
            samplePlate = Math.floor(nextAutoIndex / positionsPerPlate) + 1;
            const localIndex = nextAutoIndex % positionsPerPlate;
            samplePos = `${ROWS[Math.floor(localIndex / COLS)]}${(localIndex % COLS) + 1}`;
            if (reservedPositions.has(`P${samplePlate}:${samplePos}`)) nextAutoIndex++;
            else foundSpot = true;
          }
          dynamicVialMap[lowerName] = { plate: samplePlate, pos: samplePos };
          nextAutoIndex++;
        }

        const fullLocation = `P${samplePlate}:${samplePos}`;
        const csVialLocation = `P${samplePlate}-${samplePos}`;
        const isCompleted = completedIndices.has(index);

        globalSequenceData.push({ location: csVialLocation, name: sampleName });

        if (tbody) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${index + 1}</td><td>${csVialLocation}</td><td>${sampleName}</td>`;
          tbody.appendChild(tr);
        }

        if (samplePlate === selectedPlate) {
          if (!vialMap[samplePos]) vialMap[samplePos] = { name: sampleName, seqNums: [index + 1], isFixed };
          else vialMap[samplePos].seqNums.push(index + 1);
        }

        let badgeClass = 'pending';
        let badgeText = 'Pending';
        if (isCompleted) {
          badgeClass = 'completed';
          badgeText = 'Completed';
        } else if (isRunning && index === completedIndices.size) {
          badgeClass = 'running';
          badgeText = 'Running';
        }

        let typeHtml = isFixed ? '<span style="font-size:10px; color:var(--text-muted); margin-left:4px;">(Fixed)</span>' : '';
        if (!isFixed) {
          if (lowerName.includes('spike')) typeHtml = '<span style="color:var(--spike-border); font-size:10px; margin-left:4px;">[Spike]</span>';
          else if (lowerName.includes('std') || lowerName.includes('cal')) typeHtml = '<span style="color:var(--std-border); font-size:10px; margin-left:4px;">[Std]</span>';
        }

        const listItem = document.createElement('div');
        listItem.className = 'queue-item';
        if (searchQuery && (sampleName.toLowerCase().includes(searchQuery) || samplePos.toLowerCase().includes(searchQuery))) {
          listItem.style.borderColor = 'var(--highlight-border)';
        }

        listItem.innerHTML = `
                  <div style="display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" style="width:14px; height:14px; margin:0;" ${isCompleted ? 'checked' : ''}>
                    <span style="font-weight:600; width:35px;">${fullLocation}</span>
                    <span style="font-weight:500;">${index + 1}. ${sampleName} ${typeHtml}</span>
                  </div>
                  <span class="badge ${badgeClass}">${badgeText}</span>
                `;

        listItem.onclick = (e) => { if (e.target.type !== 'checkbox') toggleCompletion(index); };
        listItem.querySelector('input').onchange = () => toggleCompletion(index);

        if (seqListEl) seqListEl.appendChild(listItem);
      });

      calculateEstimates();

      if (globalSequenceData.length > 0 && completedIndices.size === globalSequenceData.length) {
        if (isRunning && !runFinishedAlerted) {
          document.getElementById('finish-time-display').innerText = new Date().toLocaleTimeString();
          openModal('finish-modal');
          runFinishedAlerted = true;
          toggleRunState(); // this will call saveToCache via its own logic if we want, but we'll do it below
        }
      } else {
        runFinishedAlerted = false;
      }

      if (!skipEmit) {
        saveToCache(false);
      }
      seqListEl.scrollTop = currentScroll;
    }


    // --- Calculator Logic ---
    function formatTime(minutes) {
      return `${Math.floor(minutes / 60)}h ${Math.round(minutes % 60)}m`;
    }

    function formatVol(mL) {
      return mL > 1000 ? (mL / 1000).toFixed(2) + ' L' : mL.toFixed(1) + ' mL';
    }

    function calculateEstimates() {
      const runTimeMin = parseFloat(document.getElementById('runtime-input').value) || 0;
      const flowRate = parseFloat(document.getElementById('flowrate-input').value) || 0;
      const timePerInj = runTimeMin + DELAY_MINS;

      const totalInj = globalSequenceData.length;
      const comp = completedIndices.size;
      const remInj = totalInj - comp;

      // PREPARATION CALCULATOR (Totals)
      const totalMins = totalInj * timePerInj;
      const totalVol = totalMins * flowRate;
      document.getElementById('prep-time').innerText = formatTime(totalMins);
      document.getElementById('prep-vol').innerText = formatVol(totalVol);

      // RUN MONITOR (Remaining)
      document.getElementById('est-injections').innerText = `${comp} / ${totalInj}`;

      if (!isRunning) {
        document.getElementById('progress-bar').style.width = totalInj === 0 ? '0%' : `${(comp / totalInj) * 100}%`;
        updateEndTime(-1); // Hide end time if not running
      } else {
        const remMins = remInj * timePerInj;
        updateEndTime(remMins);
      }
    }

    function updateEndTime(remMins) {
      if (remMins > 0 && globalSequenceData.length > 0) {
        const now = new Date();
        now.setTime(now.getTime() + remMins * 60000); // add exactly in milliseconds
        document.getElementById('est-end').innerText = now.toLocaleString([], { weekday: 'short', hour: '2-digit', minute: '2-digit' });
        document.getElementById('est-end').style.color = 'var(--text-primary)';
      } else if (globalSequenceData.length > 0 && completedIndices.size === globalSequenceData.length) {
        document.getElementById('est-end').innerText = 'Finished!';
        document.getElementById('est-end').style.color = 'var(--success-color)';
      } else {
        document.getElementById('est-end').innerText = '--:--';
        document.getElementById('est-end').style.color = 'var(--text-primary)';
      }
    }

    function startLiveTimer() {
      setInterval(() => {
        document.getElementById('live-clock').innerText = new Date().toLocaleTimeString();

        if (globalSequenceData.length > 0) {
          const runTimeMin = parseFloat(document.getElementById('runtime-input').value) || 0;
          const timePerInjMs = (runTimeMin + DELAY_MINS) * 60 * 1000;

          if (isRunning) {
            if (completedIndices.size < globalSequenceData.length) {
              const elapsed = Date.now() - currentSampleStartTime;

              // Auto-advance if sample finished
              if (elapsed >= timePerInjMs) {
                completedIndices.add(completedIndices.size); // marks the current index complete
                currentSampleStartTime = Date.now();
                updateVisualization();
              } else {
                // Smooth progress update
                const totalMsNeeded = globalSequenceData.length * timePerInjMs;
                const totalMsElapsed = (completedIndices.size * timePerInjMs) + elapsed;
                const progressPct = Math.min((totalMsElapsed / totalMsNeeded) * 100, 100);

                document.getElementById('progress-bar').style.width = `${progressPct}%`;

                const totalRemMs = totalMsNeeded - totalMsElapsed;
                updateEndTime(totalRemMs / 60000);
              }
            }
          } else {
            // Hide estimated end time if not running
            updateEndTime(-1);
          }
        }
      }, 500); // Check twice a second for smooth progress updates
    }

    // --- QR and File Import ---
    function startScanner() {
      openModal('qr-modal');
      if (!html5QrcodeScanner) html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false);
      html5QrcodeScanner.render((text) => {
        const seq = document.getElementById('sequence-input');
        if (text.includes(',') && !text.includes('\n')) text = text.split(',').map(s => s.trim()).join('\n');
        seq.value = seq.value.trim() === '' ? text : seq.value + '\n' + text;
        updateVisualization(); stopScanner();
      }, () => { });
    }
    function stopScanner() {
      if (html5QrcodeScanner) html5QrcodeScanner.clear().catch(e => console.error(e));
      closeModal('qr-modal');
    }

    function handleImport(event) {
      const file = event.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        const lines = e.target.result.split(/\r?\n/); let names = [];
        if (lines.length > 0) {
          const hLine = lines[0].toLowerCase();
          if (hLine.includes('sample name') && hLine.includes(',')) {
            const h = hLine.split(','); const idx = h.findIndex(x => x.trim().replace(/"/g, '') === 'sample name');
            if (idx !== -1) {
              for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                let n = lines[i].split(',')[idx]?.trim();
                if (n) names.push(n.replace(/^"|"$/g, ''));
              }
            } else names = lines.map(l => l.trim()).filter(Boolean);
          } else names = lines.map(l => l.trim()).filter(Boolean);
        }
        const seq = document.getElementById('sequence-input');
        seq.value = seq.value.trim() === '' ? names.join('\n') : seq.value + '\n' + names.join('\n');
        updateVisualization(); event.target.value = '';
      };
      reader.readAsText(file);
    }

    // --- Export ---
    function copyChemStationData(type) {
      if (globalSequenceData.length === 0) return alert('No data to copy.');
      let arr = [], msg = "";
      if (type === 'all') { arr = globalSequenceData.map(d => `${d.location}\t${d.name}`); msg = "Copied both columns!"; }
      else if (type === 'location') { arr = globalSequenceData.map(d => d.location); msg = "Copied locations!"; }
      else if (type === 'name') { arr = globalSequenceData.map(d => d.name); msg = "Copied names!"; }
      navigator.clipboard.writeText(arr.join('\n')).then(() => alert(msg)).catch(() => alert('Failed to copy.'));
    }

    function downloadCSV() {
      if (globalSequenceData.length === 0) return alert("No data to download.");
      let csv = "Sample,Vial,Name\n";
      globalSequenceData.forEach((r, i) => csv += `"${i + 1}","${r.location}","${r.name.replace(/"/g, '""')}"\n`);
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      if (window.navigator && window.navigator.msSaveOrOpenBlob) window.navigator.msSaveOrOpenBlob(blob, "Sequence.csv");
      else {
        const link = document.createElement("a"); link.href = URL.createObjectURL(blob); link.download = "Sequence.csv";
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      }
    }

    createBoard(); loadFromCache(); startLiveTimer(); updateVisualization();
  </script>
  <footer style="text-align: center; font-size: 10px; color: var(--text-muted); padding: 4px;">
